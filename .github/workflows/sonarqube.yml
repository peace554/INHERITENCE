name: SonarQube Analysis
on: 
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
   name: SonarQube Scan
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     with:
       fetch-depth: 0

       - name: Set up JDK 11
         uses: actions/setup-java@v4
         with:
           java-version: '11'
           distribtion: 'temurin'

        - name: Cache SonarQube packgaes
          uses: actions/cache@v4
          with:
            path: ~/.sonar/cache
            key: ${{runner.os}}-sonar

        - name: Build and analyze
          env:
          SONAR_TOKEN: ${{ secrects.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrects.SONAR_HOST_URL }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectkey=my-java-project \
            -Dsonar.host.url=${{ secrects.SONAR_HOST_URL }} \
            -Dsonar.logic=${{ secrects.SONAR_TOKEN }}
